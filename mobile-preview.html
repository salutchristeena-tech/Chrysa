<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MarC AI - Mobile Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      gap: 18px;
      padding: 28px;
      background:
        radial-gradient(circle at 12% 0%, rgba(49, 87, 255, 0.16), transparent 26%),
        linear-gradient(180deg, #f8faff, #eef2ff);
      color: #101828;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      width: min(100%, 430px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
    }

    a {
      color: #3157ff;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    .phone {
      width: 390px;
      height: 844px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 110px);
      overflow: hidden;
      border: 12px solid #111827;
      border-radius: 44px;
      background: #fff;
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.26);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>MarC AI mobile preview</h1>
    <a href="/" target="_blank" rel="noreferrer">Open full site</a>
  </header>
  <main class="phone" aria-label="Mobile viewport preview">
    <iframe src="/" title="MarC AI mobile viewport"></iframe>
  </main>
</body>
</html>
