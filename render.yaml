services:
  - type: web
    name: chrysa
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data
    disk:
      name: chrysa-data
      mountPath: /var/data
      sizeGB: 1
